backend:
  name: git-gateway
  branch: main # Branch to update

local_backend: true

media_folder: "static/img" # Media files will be stored in the repo under static/img
public_folder: "/img" # The src attribute for uploaded media will begin with /img

collections:
  - name: "docs"
    label: "Documentation"
    folder: "docs"
    create: true
    nested:
      depth: 10
      summary: "{{title}}"
    slug: "{{slug}}"
    meta: { path: { widget: "string", label: "Path", index_file: "index" } }
    fields:
      - {label: "Title", name: "title", widget: "string", required: false}
      - {label: "Sidebar Position", name: "sidebar_position", widget: "number", required: false}
      - {label: "Sidebar Class Name", name: "sidebar_class_name", widget: "string", required: false}
      - {label: "Slug", name: "slug", widget: "string", required: false}
      - {label: "Body", name: "body", widget: "markdown"}
